<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description"
        content="A responsive temple picture album featuring temples from around the world created for the WDD 131 Dynamic Web Fundamentals course.">

    <meta name="author" content="Magdalene Shehu">

    <title>Temple Album</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Merriweather:wght@700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">

    <script src="scripts/temples.js" defer></script>
</head>

<body>

    <header>
        <div class="header-container">
            <h2>Temple Album</h2>

            <button id="menu" aria-label="Menu"></button>

            <nav class="navigation">
                <a href="#">Home</a>
                <a href="#">Old</a>
                <a href="#">New</a>
                <a href="#">Large</a>
                <a href="#">Small</a>
            </nav>
        </div>
    </header>

    <main>
        <h1>Temple Album</h1>

        <div class="gallery">

            <figure>
                <img src="images/salt.webp" alt="Salt Lake Temple" loading="lazy">
                <figcaption>Salt Lake Temple</figcaption>
            </figure>

            <figure>
                <img src="images/accra_ghana.jpg" alt="Accra Ghana Temple" loading="lazy">
                <figcaption>Accra Ghana Temple</figcaption>
            </figure>

            <figure>
                <img src="images/rome.webp" alt="Rome Italy Temple" loading="lazy">
                <figcaption>Rome Italy Temple</figcaption>
            </figure>

            <figure>
                <img src="images/manila.webp" alt="Manila Philippines Temple" loading="lazy">
                <figcaption>Manila Philippines Temple</figcaption>
            </figure>

            <figure>
                <img src="images/london.webp" alt="London England Temple" loading="lazy">
                <figcaption>London England Temple</figcaption>
            </figure>

            <figure>
                <img src="images/johannesburg.jpg" alt="Johannesburg South Africa Temple" loading="lazy">
                <figcaption>Johannesburg South Africa Temple</figcaption>
            </figure>

            <figure>
                <img src="images/paris.webp" alt="Paris France Temple" loading="lazy">
                <figcaption>Paris France Temple</figcaption>
            </figure>

            <figure>
                <img src="images/mexico.webp" alt="Mexico City Temple" loading="lazy">
                <figcaption>Mexico City Temple</figcaption>
            </figure>

            <figure>
                <img src="images/south-africa.webp" alt="South Africa Temple" loading="lazy">
                <figcaption>South Africa Temple</figcaption>
            </figure>

        </div>
    </main>

    <footer>
        <p>
            © <span id="currentyear"></span>
            🌸 Magdalene Shehu 🌸 Nigeria
        </p>

        <p id="lastModified"></p>
    </footer>

</body>

</html>
